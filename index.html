<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="light-theme">
    <div class="container">
        <h1 class="heading">Body Mass Index (BMI) Calculator</h1>

        <label for="height">Your Height (cm):</label>
        <input type="number" class="input" id="height" value="180" placeholder="Enter your height in cm">

        <label for="weight">Your Weight (kg):</label>
        <input type="number" class="input" id="weight" value="80" placeholder="Enter your weight in kg">

        <div class="button-group">
            <button class="btn" id="btn">Compute BMI</button>
            <button class="btn reset-btn" id="reset-btn">Reset</button>
        </div>

        <input disabled type="text" class="input" id="bmi-result" placeholder="Your BMI will appear here">

        <h4 class="info-text">Weight Condition: <span id="weight-condition"></span></h4>
        <p class="health-insight" id="health-insight"></p>

        <div class="theme-toggle">
            <label>
                <input type="checkbox" id="theme-switch"> Dark Mode
            </label>
        </div>
    </div>

    <script src="assets/js/index.js"></script>
</body>
</html>
