<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="light-theme">

<div class="container">

<h1 class="heading">Body Mass Index (BMI) Calculator</h1>

<label>Age:</label>
<input type="number" class="input" id="age" value="25">

<label>Gender:</label>
<select class="input" id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Your Height (cm):</label>
<input type="number" class="input" id="height" value="180">

<label>Your Weight (kg):</label>
<input type="number" class="input" id="weight" value="80">

<div class="button-group">
<button class="btn" id="btn">Compute BMI</button>
<button class="btn reset-btn" id="reset-btn">Reset</button>
</div>

<br>

<label>BMI Result:</label>
<input disabled type="text" class="input" id="bmi-result">

<label>Body Fat Percentage:</label>
<input disabled type="text" class="input" id="body-fat">

<label>Ideal Weight Range:</label>
<input disabled type="text" class="input" id="ideal-weight">

<h4 class="info-text">
Weight Condition: <span id="weight-condition"></span>
</h4>

<p id="health-insight"></p>
<p id="recommendations"></p>

<div class="bmi-meter">
<div id="bmi-progress"></div>
</div>

<h4>BMI History</h4>
<ul id="bmi-history"></ul>

<div class="health-resources">
<h4>Helpful Resources</h4>
<ul>
<li><a href="https://www.nhs.uk/live-well/healthy-weight/bmi-calculator/" target="_blank">NHS BMI Guide</a></li>
<li><a href="https://www.who.int/news-room/fact-sheets/detail/obesity-and-overweight" target="_blank">WHO Obesity Information</a></li>
<li><a href="https://www.nhs.uk/live-well/eat-well/" target="_blank">Healthy Eating Advice</a></li>
</ul>
</div>

<div class="theme-toggle">
<label>
<input type="checkbox" id="theme-switch"> Dark Mode
</label>
</div>

</div>

<script src="assets/js/index.js"></script>

</body>
</html>
